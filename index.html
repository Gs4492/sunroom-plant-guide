<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sunroom Plant Guide</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <div class="header">
    <h1>Plant Guide</h1>
    <p>Search care information for Sunroom Plants inventory</p>
</div>

        <input type="text" id="searchBox" placeholder="Search a plant...">

        <div id="resultCount"></div>

        <div class="filter-bar">

            <button class="filter-btn" data-filter="petsafe">
                🐾 Pet Safe
            </button>

            <button class="filter-btn" data-filter="beginner">
                🌱 Beginner
            </button>

            <button class="filter-btn" data-filter="air">
                🍃 Air Purifier
            </button>

            <button class="filter-btn" data-filter="all">
                Show All
            </button>

        </div>

        <div id="results"></div>

        <div id="plantDetails" style="display:none;"></div>

    </div>

    <script src="app.js"></script>

</body>

</html>
